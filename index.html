<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lunaverge App Support</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f9fb;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5d6b7a;
      --line: #d8e0e8;
      --accent: #0f766e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101418;
        --panel: #171d23;
        --text: #f4f7fa;
        --muted: #aab6c2;
        --line: #2d3843;
        --accent: #2dd4bf;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }
    header, section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.1;
    }
    h2 { margin: 0 0 12px; font-size: 1.25rem; }
    p { margin: 0 0 18px; color: var(--muted); }
    ul { margin: 0; padding-left: 22px; color: var(--muted); }
    a { color: var(--accent); font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Lunaverge App Support</h1>
      <p>Support and privacy information for Lunaverge apps.</p>
    </header>

    <section>
      <h2>Apps</h2>
      <ul>
        <li>
          DockerMon Pro:
          <a href="./dockermon/support.html">Support</a>
          /
          <a href="./dockermon/privacy.html">Privacy Policy</a>
        </li>
        <li>
          Simulated Call / 模拟电话:
          <a href="./callmate/support.html">Support</a>
          /
          <a href="./callmate/privacy.html">Privacy Policy</a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
